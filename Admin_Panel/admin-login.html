<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-red-900 to-blue-600 text-white">

    <div class="bg-white bg-opacity-10 backdrop-blur-lg rounded-lg shadow-lg p-8 w-full max-w-md">
        <!-- Admin Panel Title -->
        <h1 class="text-4xl font-bold text-center mb-6">Admin Login</h1>

        <!-- Login Form -->
        <form action="admin-dashboard.html" method="POST" class="space-y-6">
            
            <!-- Email -->
            <div>
                <label for="email" class="block text-lg font-medium mb-2">Email</label>
                <input type="email" id="email" name="email" required placeholder="Enter your email"
                    class="w-full p-3 rounded-lg bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Password -->
            <div>
                <label for="password" class="block text-lg font-medium mb-2">Password</label>
                <input type="password" id="password" name="password" required placeholder="Enter your password"
                    class="w-full p-3 rounded-lg bg-white text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500">
            </div>

            <!-- Login Button -->
            <div>
                <button type="submit"
                    class="w-full bg-blue-700 hover:bg-blue-800 text-white text-lg font-bold py-3 rounded-lg transition duration-300">
                    Login
                </button>
            </div>

        </form>

        <!-- Forgot Password -->
        <p class="text-center text-sm mt-4">
            <a href="#" class="text-blue-300 hover:underline">Forgot Password?</a>
        </p>

    </div>

</body>

</html>
