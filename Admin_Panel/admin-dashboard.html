<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-gray-100 text-gray-800 flex">

    <!-- Sidebar -->
    <aside id="sidebar"
    class="w-72 bg-gradient-to-b from-blue-900 to-blue-600 text-white min-h-screen p-6 fixed top-0 left-0 transform -translate-x-full transition-transform duration-300 ease-in-out z-50 lg:translate-x-0 shadow-lg">

    <!-- Sidebar Header -->
    <div class="flex items-center justify-between mb-8">
        <h2 class="text-3xl font-bold tracking-wide">Admin Panel</h2>
        <button onclick="toggleSidebar()"
            class="text-white text-3xl focus:outline-none lg:hidden">&times;</button>
    </div>

    <!-- Navigation -->
    <nav class="space-y-6">
        <a href="admin-dashboard.html"
            class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 hover:pl-5 transform transition-all duration-300 ease-in-out">
            <span>📊</span>
            <span class="text-lg font-medium">Dashboard</span>
        </a>
        <a href="manage-products.html"
            class="flex items-center space-x-3 p-3 rounded-lg bg-blue-800 hover:bg-blue-700 hover:pl-5 transform transition-all duration-300 ease-in-out">
            <span>🛒</span>
            <span class="text-lg font-medium">Manage Products</span>
        </a>
        <a href="manage-users.html"
            class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 hover:pl-5 transform transition-all duration-300 ease-in-out">
            <span>👥</span>
            <span class="text-lg font-medium">Manage Users</span>
        </a>
        <a href="order-management.html"
            class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 hover:pl-5 transform transition-all duration-300 ease-in-out">
            <span>📦</span>
            <span class="text-lg font-medium">Orders</span>
        </a>
        <a href="admin-login.html"
            class="flex items-center space-x-3 p-3 rounded-lg hover:bg-red-600 hover:pl-5 transform transition-all duration-300 ease-in-out">
            <span>🚪</span>
            <span class="text-lg font-medium">Login</span>
        </a>
    </nav>

        <!-- Admin Profile -->
        <div class="absolute bottom-8 left-6 right-6 flex items-center bg-blue-800 p-4 rounded-lg gap-4">
            <img src="https://via.placeholder.com/50" alt="Admin Avatar"
                class="rounded-full w-12 h-12 border-2 border-white">
            <div>
                <p class="text-white font-medium">Admin Name</p>
                <p class="text-blue-300 text-sm">admin@example.com</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-2 lg:ml-72 min-h-screen">

        <!-- Page Title -->
        <h1 class="text-4xl font-extrabold text-blue-800">Dashboard Overview</h1>
        <br/>

        <!-- Overview Cards -->
        <section class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">

            <div class="bg-white p-6 rounded-lg shadow-lg border-t-4 border-blue-600">
                <h5 class="text-lg font-medium text-gray-700">Total Users</h5>
                <p id="totalUsers" class="text-4xl font-bold text-blue-800 mt-2 counter" data-count="120">0</p>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg border-t-4 border-green-600">
                <h5 class="text-lg font-medium text-gray-700">Total Products</h5>
                <p id="totalProducts" class="text-4xl font-bold text-green-800 mt-2 counter" data-count="75">0</p>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg border-t-4 border-red-600">
                <h5 class="text-lg font-medium text-gray-700">Total Orders</h5>
                <p id="totalOrders" class="text-4xl font-bold text-red-800 mt-2 counter" data-count="240">0</p>
            </div>

            <div class="bg-white p-6 rounded-lg shadow-lg border-t-4 border-teal-600">
                <h5 class="text-lg font-medium text-gray-700">Total Revenue</h5>
                <p id="totalRevenue" class="text-4xl font-bold text-teal-800 mt-2 counter" data-count="15300">$0</p>
            </div>

        </section>

        <!-- Charts Section -->
        <section class="grid grid-cols-1 lg:grid-cols-2 gap-4">

            <div class="bg-white p-5 rounded-lg shadow-md">
                <h2 class="text-2xl font-bold mb-4">Product Range</h2>
                <canvas id="productRangeChart" style="max-height: 300px;"></canvas>
            </div>

            <div class="bg-white p-5 rounded-lg shadow-md">
                <h2 class="text-2xl font-bold mb-4">Sales Trends</h2>
                <canvas id="salesTrendChart" style="max-height: 300px;"></canvas>
            </div>

        </section>

    </main>

    <script>
        // Product Range Chart
        const productRangeCtx = document.getElementById('productRangeChart').getContext('2d');
        new Chart(productRangeCtx, {
            type: 'doughnut',
            data: {
                labels: ['Vegetables', 'Fruits', 'Chips', 'Dairy'],
                datasets: [{
                    label: 'Product Range',
                    data: [40, 30, 15, 15],
                    backgroundColor: ['#22c55e', '#facc15', '#f97316', '#3b82f6'],
                    hoverOffset: 4
                }]
            }
        });

        // Sales Trend Chart
        const salesTrendCtx = document.getElementById('salesTrendChart').getContext('2d');
        new Chart(salesTrendCtx, {
            type: 'line',
            data: {
                labels: ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul'],
                datasets: [{
                    label: 'Monthly Sales ($)',
                    data: [4000, 5000, 7000, 6000, 9000, 11000, 13000],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.5)',
                    fill: true,
                    tension: 0.4
                }]
            }
        });
    </script>
    <script>
        // Counter Animation
        document.querySelectorAll('.counter').forEach(counter => {
            const updateCount = () => {
                const target = +counter.getAttribute('data-count');
                const count = +counter.innerText;
                const increment = target / 200;

                if (count < target) {
                    counter.innerText = Math.ceil(count + increment);
                    setTimeout(updateCount, 20);
                } else {
                    counter.innerText = target;
                }
            };
            updateCount();
        });
    </script>


</body>

</html>
