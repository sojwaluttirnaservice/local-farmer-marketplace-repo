<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Products</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100 text-gray-800 flex">

    <!-- Sidebar -->
    <aside id="sidebar"
        class="w-72 bg-gradient-to-b from-blue-900 to-blue-600 text-white min-h-screen p-6 fixed top-0 left-0 transform -translate-x-full transition-transform duration-300 ease-in-out z-50 lg:translate-x-0 shadow-lg">

        <!-- Sidebar Header -->
        <div class="flex items-center justify-between mb-8">
            <h2 class="text-3xl font-bold tracking-wide">Admin Panel</h2>
            <button onclick="toggleSidebar()"
                class="text-white text-3xl focus:outline-none lg:hidden">&times;</button>
        </div>

        <!-- Navigation -->
        <nav class="space-y-6">
            <a href="admin-dashboard.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 hover:pl-5 transform transition-all duration-300 ease-in-out">
                <span>📊</span>
                <span class="text-lg font-medium">Dashboard</span>
            </a>
            <a href="manage-products.html"
                class="flex items-center space-x-3 p-3 rounded-lg bg-blue-800 hover:bg-blue-700 hover:pl-5 transform transition-all duration-300 ease-in-out">
                <span>🛒</span>
                <span class="text-lg font-medium">Manage Products</span>
            </a>
            <a href="manage-users.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 hover:pl-5 transform transition-all duration-300 ease-in-out">
                <span>👥</span>
                <span class="text-lg font-medium">Manage Users</span>
            </a>
            <a href="order-management.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-blue-700 hover:pl-5 transform transition-all duration-300 ease-in-out">
                <span>📦</span>
                <span class="text-lg font-medium">Orders</span>
            </a>
            <a href="admin-login.html"
                class="flex items-center space-x-3 p-3 rounded-lg hover:bg-red-600 hover:pl-5 transform transition-all duration-300 ease-in-out">
                <span>🚪</span>
                <span class="text-lg font-medium">Login</span>
            </a>
        </nav>

        <!-- Admin Profile -->
        <div class="absolute bottom-8 left-6 right-6 flex items-center bg-blue-800 p-4 rounded-lg gap-4">
            <img src="https://via.placeholder.com/50" alt="Admin Avatar"
                class="rounded-full w-12 h-12 border-2 border-white">
            <div>
                <p class="text-white font-medium">Admin Name</p>
                <p class="text-blue-300 text-sm">admin@example.com</p>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 p-8 ml-72">

        <!-- Page Header -->
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-semibold">Manage Products</h1>
            <button onclick="openModal()"
                class="bg-blue-600 text-white px-5 py-2 rounded hover:bg-blue-700">+ Add New Product</button>
        </div>

        <!-- Search and Filters -->
        <div class="flex flex-wrap items-center gap-4 mb-6">
            <input type="text" placeholder="Search products..."
                class="w-full sm:w-1/3 p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">

            <select class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                <option value="">Filter by Stock</option>
                <option value="in-stock">In Stock</option>
                <option value="out-of-stock">Out of Stock</option>
            </select>

            <select class="p-3 border rounded-lg focus:ring-2 focus:ring-blue-500">
                <option value="">Sort by Price</option>
                <option value="low-to-high">Low to High</option>
                <option value="high-to-low">High to Low</option>
            </select>
        </div>

        <!-- Products Table -->
        <div class="bg-white rounded-lg shadow overflow-x-auto">
            <table class="w-full text-left border-collapse">
                <thead>
                    <tr class="bg-blue-600 text-white">
                        <th class="p-4"><input type="checkbox" id="selectAll" class="w-5 h-5"></th>
                        <th class="p-4">Image</th>
                        <th class="p-4">Product Name</th>
                        <th class="p-4">Price</th>
                        <th class="p-4">Stock</th>
                        <th class="p-4 text-center">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Example Product Rows -->
                    <tr class="border-t hover:bg-gray-50">
                        <td class="p-4"><input type="checkbox" class="w-5 h-5"></td>
                        <td class="p-4"><img src="https://via.placeholder.com/50" alt="Product" class="rounded"></td>
                        <td class="p-4">Fresh Carrots</td>
                        <td class="p-4">$2.50 / kg</td>
                        <td class="p-4 text-green-600">120 kg</td>
                        <td class="p-4 text-center">
                            <button class="text-blue-600 hover:underline mr-2">Edit</button>
                            <button class="text-red-600 hover:underline">Delete</button>
                        </td>
                    </tr>

                    <tr class="border-t hover:bg-gray-50">
                        <td class="p-4"><input type="checkbox" class="w-5 h-5"></td>
                        <td class="p-4"><img src="https://via.placeholder.com/50" alt="Product" class="rounded"></td>
                        <td class="p-4">Red Apples</td>
                        <td class="p-4">$3.00 / kg</td>
                        <td class="p-4 text-green-600">80 kg</td>
                        <td class="p-4 text-center">
                            <button class="text-blue-600 hover:underline mr-2">Edit</button>
                            <button class="text-red-600 hover:underline">Delete</button>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- Pagination -->
        <div class="flex justify-between items-center mt-6">
            <p>Showing 1-2 of 10 products</p>
            <div class="flex space-x-2">
                <button class="px-4 py-2 rounded bg-gray-300 hover:bg-gray-400">&laquo; Prev</button>
                <button class="px-4 py-2 rounded bg-blue-600 text-white hover:bg-blue-700">1</button>
                <button class="px-4 py-2 rounded bg-gray-300 hover:bg-gray-400">2</button>
                <button class="px-4 py-2 rounded bg-gray-300 hover:bg-gray-400">Next &raquo;</button>
            </div>
        </div>

    </main>

    <!-- JavaScript -->
    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            sidebar.classList.toggle('-translate-x-full');
        }
    </script>

    

</body>

</html>
