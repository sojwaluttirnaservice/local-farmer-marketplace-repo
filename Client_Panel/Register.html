<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | My Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-r from-green-400 to-blue-500 flex justify-center items-center min-h-screen p-4">

    <!-- Registration Form Container -->
    <div class="bg-white p-10 rounded-lg shadow-lg w-full max-w-lg max-h-[125vh]">
        <h2 class="text-4xl font-extrabold text-center text-green-600">Create Your Account</h2>

        <form id="registrationForm" class="mt-6 space-y-5">

            <!-- Full Name -->
            <div>
                <label for="fullName" class="block font-medium text-gray-700 mb-1">Full Name</label>
                <input type="text" id="fullName" class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:ring-4 focus:ring-green-400" placeholder=" Your Full Name" required>
            </div>

            <!-- Phone Number -->
            <div>
                <label for="phoneNumber" class="block font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="tel" id="phoneNumber" class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:ring-4 focus:ring-green-400" placeholder="Your Phone Number" required>
            </div>

            <!-- Password -->
            <div>
                <label for="phoneNumber" class="block font-medium text-gray-700 mb-1">Password</label>
                <input type="tel" id="phoneNumber" class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:ring-4 focus:ring-green-400" placeholder="Password" required>
            </div>

            <!-- Confirm Password -->
            <div>
                <label for="phoneNumber" class="block font-medium text-gray-700 mb-1">Confirm Password</label>
                <input type="tel" id="phoneNumber" class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:ring-4 focus:ring-green-400" placeholder="Confirm Password" required>
            </div>

            <!-- Address -->
            <div>
                <label for="address" class="block font-medium text-gray-700 mb-1">Address</label>
                <textarea id="address" class="w-full border-2 border-gray-300 px-4 py-3 rounded-lg focus:ring-4 focus:ring-green-400" placeholder="Your Address" required></textarea>
            </div>

            <!-- Profile Picture -->
            <!-- <div class="flex flex-col items-center">
                <label for="profilePic" class="block font-medium text-gray-700 mb-1">Profile Picture (Optional)</label>
                <input type="file" id="profilePic" accept="image/*" class="border-2 border-gray-300 px-4 py-3 rounded-lg w-full">
                <img id="previewImg" class="hidden w-28 h-28 mt-4 rounded-full border-2 border-green-400 shadow-lg" alt="Profile Preview">
            </div> -->

            <!-- Terms and Conditions -->
            <div class="flex items-center gap-2">
                <input type="checkbox" id="terms" class="w-5 h-5 text-green-600 border-2 border-gray-300 rounded">
                <label for="terms" class="text-gray-700 text-sm">I agree to the <a href="#" class="text-green-600 underline">Terms and Conditions</a></label>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="w-full bg-gradient-to-r from-green-600 to-blue-500 text-white py-3 rounded-lg font-bold text-lg hover:from-green-500 hover:to-blue-400 transition duration-300">
                Register Now
            </button>

            <!-- Login Link -->
            <p class="text-center text-gray-600 mt-4">
                Already a member? 
                <a href="login.html" class="text-blue-600 hover:underline">Log in here</a>
            </p>
        </form>
    </div>

    <script>
        // Profile Picture Preview
        document.getElementById('profilePic').addEventListener('change', function(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    const previewImg = document.getElementById('previewImg');
                    previewImg.src = e.target.result;
                    previewImg.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        });

        // Form Validation
        document.getElementById('registrationForm').addEventListener('submit', function(event) {
            const termsChecked = document.getElementById('terms').checked;
            if (!termsChecked) {
                alert("Please accept the Terms and Conditions to continue.");
                event.preventDefault();
            }
        });
    </script>

</body>
</html>
