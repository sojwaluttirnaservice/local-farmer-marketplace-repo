<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | My Shop</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-green-400 to-blue-500 p-4">
    <div class="w-full max-w-md">
        <div class="bg-white shadow-2xl rounded-3xl overflow-hidden">
            <div class="p-8">
                <h3 class="text-3xl font-extrabold text-center text-gray-800 mb-6">LOG IN</h3>
                
                <form action="#" method="POST">
                    <div class="space-y-6">
                        <div class="relative">
                            <label for="email" class="text-sm font-medium text-gray-700 block mb-2">Email</label>
                            <div class="flex items-center relative">
                                <i class="fas fa-envelope text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
                                <input
                                    type="email"
                                    id="email"
                                    class="block w-full pl-10 pr-10 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 sm:text-sm"
                                    placeholder="you@example.com"
                                    required
                                >
                                <button type="button" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600" onclick="clearInput('email')">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>

                        <div class="relative">
                            <label for="password" class="text-sm font-medium text-gray-700 block mb-2">Password</label>
                            <div class="flex items-center relative">
                                <i class="fas fa-lock text-gray-400 absolute left-3 top-1/2 transform -translate-y-1/2"></i>
                                <input
                                    type="password"
                                    id="password"
                                    class="block w-full pl-10 pr-10 py-2 border border-gray-300 rounded-md leading-5 bg-white placeholder-gray-500 focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-green-500 sm:text-sm"
                                    placeholder="••••••••"
                                    required
                                >
                                <button type="button" class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-400 hover:text-gray-600" onclick="clearInput('password')">
                                    <i class="fas fa-times"></i>
                                </button>
                            </div>
                        </div>

                        

                        <div>
                            <button
                                type="submit"
                                class="w-full bg-gradient-to-r from-green-600 to-blue-500 text-white py-3 rounded-lg font-bold text-lg hover:from-green-500 hover:to-blue-400"
                            >
                                Sign in
                            </button>
                        </div>
                    </div>
                </form>
            </div>
            
            <div class="px-8 py-4 bg-gray-50 border-t border-gray-100">
                <p class="text-xs text-gray-600 text-center">
                    Don't have an account?
                    <a href="register.html" class="font-medium text-green-600 hover:text-green-500 ml-1">
                        Sign up
                    </a>
                </p>
            </div>
        </div>
    </div>

    <script>
        function clearInput(inputId) {
            document.getElementById(inputId).value = '';
        }
    </script>
</body>
</html>
